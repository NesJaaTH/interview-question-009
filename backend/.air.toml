root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server.exe ./cmd/server"
  bin = "./tmp/server.exe"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "data.db"]
  include_ext = ["go"]
  stop_on_error = true
  log = "tmp/build-errors.log"

[color]
  build   = "yellow"
  watcher = "cyan"
  runner  = "green"
  main    = "magenta"

[log]
  time = true

[misc]
  clean_on_exit = true
